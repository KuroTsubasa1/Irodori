# Irodori — nginx vhost for irodori.lasseharm.space
#
# This is the plain HTTP (port 80) config. Certbot's --nginx plugin edits this
# file in place on first run: it injects the `listen 443 ssl` block, the
# certificate paths, and an HTTP->HTTPS redirect. Do not hand-add the 443 block
# here — let certbot own it so renewals stay consistent.

server {
    listen 80;
    listen [::]:80;

    server_name irodori.lasseharm.space;

    root /opt/irodori;
    index index.html;

    # Single-page-ish static app: serve the file, fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the vendored libs and app scripts (they're versioned by deploy).
    location ~* \.(?:js|css|svg|png|jpe?g|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;

    # Let's Encrypt HTTP-01 challenge files (used by certbot --nginx / webroot).
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
}
