  </defs>
  <rect x="10" y="8" width="108" height="108" rx="34" fill="url(#g)" filter="url(#s)"/>
  <rect x="10" y="8" width="108" height="108" rx="34" fill="none" stroke="#fff" stroke-opacity="0.30" stroke-width="1.5"/>
  <text x="64" y="64" text-anchor="middle" dominant-baseline="central"
