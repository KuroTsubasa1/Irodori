<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="Irodori logo">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1" gradientTransform="rotate(50 .5 .5)">
      <stop offset="0" stop-color="#ff7d5e"/>
      <stop offset="1" stop-color="#ec4636"/>
    </linearGradient>
    <filter id="s" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#ff5d4e" flood-opacity="0.45"/>
